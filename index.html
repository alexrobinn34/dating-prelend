<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Premium dating prelander with locked profiles and live video chats.">
    <title>VelvetMeet</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand js-register" href="#" aria-label="VelvetMeet">
          <span class="brand-mark">V</span>
          <span class="brand-name">VelvetMeet</span>
        </a>

        <nav class="language-switcher" aria-label="Language selector">
          <button type="button" data-lang="de">&#x1F1E9;&#x1F1EA; DE</button>
          <button type="button" data-lang="pl">&#x1F1F5;&#x1F1F1; PL</button>
          <button type="button" data-lang="en">&#x1F1EC;&#x1F1E7; EN</button>
          <button type="button" data-lang="fr">&#x1F1EB;&#x1F1F7; FR</button>
          <button type="button" data-lang="it">&#x1F1EE;&#x1F1F9; IT</button>
        </nav>
      </header>

      <main>
        <section class="hero section-reveal" id="hero">
          <div class="hero-bg" aria-hidden="true"></div>
          <div class="hero-noise" aria-hidden="true"></div>
          <div class="hero-content">
            <p class="eyebrow" data-i18n="hero.kicker"></p>
            <h1 data-i18n="hero.title"></h1>
            <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
            <div class="hero-actions">
              <a class="btn btn-primary js-register" href="#" data-i18n="common.cta"></a>
              <span class="microcopy" data-i18n="hero.microcopy"></span>
            </div>
          </div>
        </section>

        <section class="content-wall section-reveal" aria-labelledby="content-title">
          <div class="section-heading dense">
            <p class="eyebrow" data-i18n="content.kicker"></p>
            <h2 id="content-title" data-i18n="content.title"></h2>
            <p data-i18n="content.subtitle"></p>
          </div>
          <div class="mixed-grid" id="contentGrid"></div>
        </section>

        <section class="stats section-reveal" aria-labelledby="stats-title">
          <div class="section-heading compact">
            <p class="eyebrow" data-i18n="stats.kicker"></p>
            <h2 id="stats-title" data-i18n="stats.title"></h2>
          </div>
          <div class="stats-grid">
            <article class="stat-card">
              <span class="stat-value" data-counter="12840">0</span>
              <span class="stat-label" data-i18n="stats.profiles"></span>
            </article>
            <article class="stat-card">
              <span class="stat-value" data-counter="3916">0</span>
              <span class="stat-label" data-i18n="stats.online"></span>
            </article>
            <article class="stat-card">
              <span class="stat-value" data-counter="724">0</span>
              <span class="stat-label" data-i18n="stats.videos"></span>
            </article>
          </div>
        </section>

        <section class="benefits section-reveal" aria-labelledby="benefits-title">
          <div class="section-heading compact">
            <p class="eyebrow" data-i18n="benefits.kicker"></p>
            <h2 id="benefits-title" data-i18n="benefits.title"></h2>
          </div>
          <div class="benefit-grid">
            <article class="benefit-card">
              <span class="benefit-icon">&#10003;</span>
              <h3 data-i18n="benefits.verifiedTitle"></h3>
              <p data-i18n="benefits.verifiedText"></p>
            </article>
            <article class="benefit-card">
              <span class="benefit-icon">&#9671;</span>
              <h3 data-i18n="benefits.safeTitle"></h3>
              <p data-i18n="benefits.safeText"></p>
            </article>
            <article class="benefit-card">
              <span class="benefit-icon">&#8599;</span>
              <h3 data-i18n="benefits.fastTitle"></h3>
              <p data-i18n="benefits.fastText"></p>
            </article>
          </div>
        </section>

        <section class="final-cta section-reveal">
          <div>
            <p class="eyebrow" data-i18n="final.kicker"></p>
            <h2 data-i18n="final.title"></h2>
            <p data-i18n="final.subtitle"></p>
          </div>
          <a class="btn btn-primary js-register" href="#" data-i18n="common.cta"></a>
        </section>
      </main>

      <footer class="site-footer">
        <span>&copy; <span id="year"></span> VelvetMeet</span>
        <span data-i18n="footer.note"></span>
      </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/profiles.js"></script>
    <script src="js/videos.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
